<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>Daily Rings</title>
    <meta charset="UTF-8">
  </head>
  <body>
    <h1>Daily Rings</h1>
    <ul>
      <li id="meditation">🧘 Meditation <span>00:00:00</span> <button onclick="toggleTimer('meditation')">Start</button></li>
      <li id="fill-water-jug">🫙 Fill Water Jug <span>00:00:00</span> <button onclick="toggleTimer('fill-water-jug')">Start</button></li>
      <li id="solace-study">🤖 Solace Study/Work <span>00:00:00</span> <button onclick="toggleTimer('solace-study')">Start</button></li>
      <li id="reading-books">📖 Reading Books <span>00:00:00</span> <button onclick="toggleTimer('reading-books')">Start</button></li>
      <li id="cooking">🍳 Cooking <span>00:00:00</span> <button onclick="toggleTimer('cooking')">Start</button></li>
      <li id="cleaning">🧹 Cleaning <span>00:00:00</span> <button onclick="toggleTimer('cleaning')">Start</button></li>
      <li id="taking-tablets">💊 Taking Tablets <span>00:00:00</span> <button onclick="toggleTimer('taking-tablets')">Start</button></li>
   </ul>

<h2>Learning Goals</h2>

<div class="ring-container">
  <p>🤖 Solace Study/Work</p>
  <svg width="80" height="80" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="35" fill="none" stroke="#1c1c1c" stroke-width="8"/>
    <circle cx="40" cy="40" r="35" fill="none" stroke="#ff0000" stroke-width="8" stroke-dasharray="220" stroke-dashoffset="220" id="solace-ring" stroke-linecap="round" transform="rotate(-90 40 40)"/>
  </svg>
  <p id="solace-time">0 / 120 min</p>
</div>
<div class="ring-container">
  <p>📖 Reading Books</p>
  <svg width="80" height="80" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="35" fill="none" stroke="#1c1c1c" stroke-width="8"/>
    <circle cx="40" cy="40" r="35" fill="none" stroke="#00ff00" stroke-width="8" stroke-dasharray="220" stroke-dashoffset="220" id="reading-ring" stroke-linecap="round" transform="rotate(-90 40 40)"/>
  </svg>
  <p id="reading-time">0 / 45 min</p>
</div>
<script src="script.js"></script>
    <script src="script.js"></script>
  </body>
</html>
